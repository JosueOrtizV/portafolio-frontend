<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fe00fe" />
      <stop offset="100%" stop-color="#00f3ff" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" fill="#0b0016" />
  
  <!-- Sun -->
  <circle cx="50" cy="50" r="30" fill="url(#sun)" filter="url(#glow)"/>
  
  <!-- Sun Stripes -->
  <rect x="10" y="55" width="80" height="3" fill="#0b0016" />
  <rect x="10" y="62" width="80" height="4" fill="#0b0016" />
  <rect x="10" y="70" width="80" height="6" fill="#0b0016" />
  <rect x="10" y="80" width="80" height="9" fill="#0b0016" />
  
  <!-- Grid -->
  <path d="M 0 60 L 100 60 M 0 70 L 100 70 M 0 85 L 100 85 M 50 60 L 50 100 M 35 60 L 10 100 M 65 60 L 90 100 M 20 60 L -30 100 M 80 60 L 130 100" stroke="#00f3ff" stroke-width="1.5" opacity="0.6"/>
</svg>
